<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реестр поставщиков — Дирекция закупок</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .stars{color:#f59e0b;font-size:12px;letter-spacing:1px}
    .sup-detail{padding:0;max-height:0;overflow:hidden;transition:max-height 0.25s ease,padding 0.2s}
    .sup-detail.open{max-height:300px;padding:16px 20px}
    .detail-row{border-top:1px solid rgba(255,255,255,0.5)}
  </style>
</head>
<body>

<div id="nav-slot"></div>

<section style="padding:40px 0 28px">
  <div class="container">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <div class="hero-tag">Внутренний реестр</div>
        <h1 style="font-size:clamp(26px,3vw,38px);font-weight:800;letter-spacing:-1px;margin-bottom:4px">Реестр поставщиков</h1>
        <p style="font-size:14px;color:var(--muted)">Аккредитованные, проверяемые и приостановленные контрагенты</p>
      </div>
      <button class="btn btn-primary" onclick="showAddModal()">+ Добавить поставщика</button>
    </div>
  </div>
</section>

<!-- STATS -->
<section style="padding:0 0 24px">
  <div class="container">
    <div class="summary-row" id="supStats"></div>
  </div>
</section>

<!-- FILTERS -->
<section style="padding:0 0 20px">
  <div class="container">
    <div class="filters">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="input" id="supSearch" placeholder="Компания, ИНН, контакт..." oninput="render()">
      </div>
      <select class="input" id="supStatus" onchange="render()" style="min-width:160px">
        <option value="">Все статусы</option>
        <option value="accredited">Аккредитован</option>
        <option value="pending">На проверке</option>
        <option value="suspended">Приостановлен</option>
      </select>
      <select class="input" id="supCat" onchange="render()" style="min-width:180px">
        <option value="">Все категории</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Сбросить</button>
    </div>
  </div>
</section>

<!-- TABLE -->
<section style="padding:0 0 80px">
  <div class="container">
    <div id="supCount" style="font-size:13px;color:var(--muted);margin-bottom:14px"></div>
    <div class="card" style="overflow:hidden">
      <div class="table-wrap">
        <table id="supTable">
          <thead>
            <tr>
              <th>Компания</th>
              <th>ИНН</th>
              <th>Категории</th>
              <th>Статус</th>
              <th>Рейтинг</th>
              <th>Контакт</th>
              <th>Дата</th>
            </tr>
          </thead>
          <tbody id="supBody"></tbody>
        </table>
      </div>
    </div>
    <div id="supEmpty" class="empty-state hidden">
      <div class="empty-icon">🏢</div>
      <div class="empty-title">Поставщики не найдены</div>
      <div style="font-size:13px;color:var(--subtle);margin-top:6px">Измените фильтры или поисковый запрос</div>
    </div>
  </div>
</section>

<!-- ADD MODAL -->
<div id="addOverlay" class="overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <div><div class="modal-title">Новый поставщик</div><div class="modal-num">Заявка на аккредитацию</div></div>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Название компании *</label>
          <input class="input" id="nName" placeholder="ООО «Пример»">
        </div>
        <div class="form-group">
          <label class="form-label">ИНН *</label>
          <input class="input mono" id="nInn" placeholder="7700000000">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Контактное лицо *</label>
          <input class="input" id="nContact" placeholder="Иванов И.И.">
        </div>
        <div class="form-group">
          <label class="form-label">Телефон</label>
          <input class="input" id="nPhone" placeholder="+7 (495) 000-00-00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="input" type="email" id="nEmail" placeholder="info@company.ru">
      </div>
      <div class="form-group">
        <label class="form-label">Категории поставок</label>
        <div id="nCats" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="addSupplier()">Добавить →</button>
    </div>
  </div>
</div>

<div id="footer-slot"></div>

<script src="app.js"></script>
<script>
document.getElementById('nav-slot').innerHTML   = navHTML('suppliers.html');
document.getElementById('footer-slot').innerHTML = footerHTML();

// Populate category filter
const allCats = [...new Set(SUPPLIERS.flatMap(s => s.cats))].sort();
const catSelect = document.getElementById('supCat');
allCats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSelect.appendChild(o); });

// Stats
function renderStats() {
  const acc  = SUPPLIERS.filter(s => s.status === 'accredited').length;
  const pend = SUPPLIERS.filter(s => s.status === 'pending').length;
  const susp = SUPPLIERS.filter(s => s.status === 'suspended').length;
  document.getElementById('supStats').innerHTML = `
    <div class="summary-card card"><div class="summary-val">${SUPPLIERS.length}</div><div class="summary-lbl">Всего в реестре</div></div>
    <div class="summary-card card" style="background:rgba(22,101,52,0.08)"><div class="summary-val" style="color:#166534">${acc}</div><div class="summary-lbl">Аккредитовано</div></div>
    <div class="summary-card card" style="background:rgba(161,98,7,0.08)"><div class="summary-val" style="color:#a16207">${pend}</div><div class="summary-lbl">На проверке</div></div>
    <div class="summary-card card" style="background:rgba(153,27,27,0.08)"><div class="summary-val" style="color:#991b1b">${susp}</div><div class="summary-lbl">Приостановлено</div></div>`;
}
renderStats();

function stars(r) {
  if (!r) return '<span style="color:var(--subtle);font-size:12px">—</span>';
  const full = Math.round(r);
  return `<span class="stars">${'★'.repeat(full)}${'☆'.repeat(5-full)}</span> <span style="font-size:11px;color:var(--muted)">${r}</span>`;
}

let expandedId = null;

function render() {
  const q    = document.getElementById('supSearch').value.toLowerCase().trim();
  const st   = document.getElementById('supStatus').value;
  const cat  = document.getElementById('supCat').value;

  const filtered = SUPPLIERS.filter(s => {
    const matchQ  = !q || s.name.toLowerCase().includes(q) || s.inn.includes(q) || s.contact.toLowerCase().includes(q);
    const matchSt = !st  || s.status === st;
    const matchCt = !cat || s.cats.includes(cat);
    return matchQ && matchSt && matchCt;
  });

  const body  = document.getElementById('supBody');
  const empty = document.getElementById('supEmpty');
  const count = document.getElementById('supCount');
  const table = document.getElementById('supTable');

  if (filtered.length === 0) {
    table.style.display = 'none';
    empty.classList.remove('hidden');
    count.textContent = '';
    return;
  }
  table.style.display = '';
  empty.classList.add('hidden');
  count.textContent = `Показано: ${filtered.length} из ${SUPPLIERS.length}`;

  const st_cfg = SUPPLIER_STATUSES;
  body.innerHTML = filtered.map(s => {
    const cfg = st_cfg[s.status];
    const isOpen = expandedId === s.id;
    return `
      <tr onclick="toggleRow('${s.id}')" style="cursor:pointer">
        <td style="font-weight:600;font-size:13px">${esc(s.name)}</td>
        <td class="td-num">${esc(s.inn)}</td>
        <td style="font-size:12px;color:var(--muted);max-width:180px">${s.cats.join(', ')}</td>
        <td><span class="badge" style="background:${cfg.bg};color:${cfg.color}">${cfg.label}</span></td>
        <td>${stars(s.rating)}</td>
        <td class="td-resp">${esc(s.contact)}</td>
        <td class="td-num">${fmtDate(s.since)}</td>
      </tr>
      <tr class="detail-row ${isOpen?'':'hidden'}" id="det-${s.id}">
        <td colspan="7" style="padding:0">
          <div style="padding:16px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;background:rgba(255,255,255,0.3)">
            <div><div class="detail-label">Телефон</div><div class="detail-value"><a href="tel:${esc(s.phone)}" style="color:var(--primary);text-decoration:none">${esc(s.phone)}</a></div></div>
            <div><div class="detail-label">Email</div><div class="detail-value"><a href="mailto:${esc(s.email)}" style="color:var(--primary);text-decoration:none">${esc(s.email)}</a></div></div>
            <div><div class="detail-label">Дата аккредитации</div><div class="detail-value">${fmtDate(s.since)}</div></div>
            <div style="grid-column:span 3;display:flex;gap:10px">
              ${s.status==='pending' ? `<button class="btn btn-sm" style="background:rgba(22,101,52,0.1);color:#166534" onclick="changeStatus(event,'${s.id}','accredited')">✓ Аккредитовать</button><button class="btn btn-sm btn-danger" onclick="changeStatus(event,'${s.id}','suspended')">✕ Отклонить</button>` : ''}
              ${s.status==='accredited' ? `<button class="btn btn-sm btn-danger" onclick="changeStatus(event,'${s.id}','suspended')">Приостановить</button>` : ''}
              ${s.status==='suspended' ? `<button class="btn btn-sm" style="background:rgba(22,101,52,0.1);color:#166534" onclick="changeStatus(event,'${s.id}','accredited')">Восстановить</button>` : ''}
            </div>
          </div>
        </td>
      </tr>`;
  }).join('');
}

function toggleRow(id) {
  expandedId = expandedId === id ? null : id;
  render();
}

function changeStatus(e, id, newStatus) {
  e.stopPropagation();
  const s = SUPPLIERS.find(s => s.id === id);
  if (s) { s.status = newStatus; s.since = s.since || new Date().toISOString().split('T')[0]; }
  renderStats();
  render();
}

function resetFilters() {
  document.getElementById('supSearch').value = '';
  document.getElementById('supStatus').value = '';
  document.getElementById('supCat').value = '';
  render();
}

// Add supplier modal
function showAddModal() {
  document.getElementById('addOverlay').classList.remove('hidden');
  const wrap = document.getElementById('nCats');
  wrap.innerHTML = '';
  CATEGORIES.forEach(c => {
    const lbl = document.createElement('label');
    lbl.style.cssText = 'display:inline-flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:4px 10px;border-radius:16px;background:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.8)';
    lbl.innerHTML = `<input type="checkbox" name="ncat" value="${esc(c)}" style="accent-color:#4a6ee0"> ${esc(c)}`;
    wrap.appendChild(lbl);
  });
}

function closeModal() { document.getElementById('addOverlay').classList.add('hidden'); }

function addSupplier() {
  const name = document.getElementById('nName').value.trim();
  const inn  = document.getElementById('nInn').value.trim();
  const contact = document.getElementById('nContact').value.trim();
  if (!name || !inn || !contact) { alert('Заполните обязательные поля'); return; }
  if (!/^\d{10}(\d{2})?$/.test(inn)) { alert('ИНН должен содержать 10 или 12 цифр'); return; }
  const cats = [...document.querySelectorAll('#nCats input:checked')].map(i => i.value);
  const newId = 'S' + String(SUPPLIERS.length + 1).padStart(2,'0');
  SUPPLIERS.push({
    id: newId,
    name, inn, cats,
    contact,
    phone: document.getElementById('nPhone').value.trim() || '—',
    email: document.getElementById('nEmail').value.trim() || '—',
    status: 'pending',
    since: new Date().toISOString().split('T')[0],
    rating: null,
  });
  closeModal();
  renderStats();
  render();
}

render();
</script>
</body>
</html>
